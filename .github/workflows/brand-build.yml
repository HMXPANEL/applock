name: Aira CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant (debug/release/lite/pro)'
        required: true
        default: 'release'
        type: choice
        options: [debug, release, lite, pro]

env:
  JAVA_VERSION: '17'
  BUILD_VARIANT: ${{ github.event.inputs.build_variant || 'release' }}

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git log / versioning

      # ─────────────────────────────────────────
      # 2. JAVA SETUP
      # ─────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # ─────────────────────────────────────────
      # 3. GRADLE CACHE
      # ─────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─────────────────────────────────────────
      # 4. AUTO VERSIONING
      # ─────────────────────────────────────────
      - name: Compute version
        id: versioning
        run: |
          # versionCode = total git commit count
          VERSION_CODE=$(git rev-list --count HEAD)
          # versionName = base + date
          BASE_NAME=$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle | head -1 || echo "1.0.0")
          DATE_TAG=$(date +'%Y%m%d.%H%M')
          VERSION_NAME="${BASE_NAME}-${DATE_TAG}"

          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "✅ versionCode=$VERSION_CODE | versionName=$VERSION_NAME"

      # ─────────────────────────────────────────
      # 5. BRANDING INJECTION
      # ─────────────────────────────────────────
      - name: Apply branding config
        run: |
          CONFIG="branding/config.txt"
          if [ -f "$CONFIG" ]; then
            source <(grep -v '^#' "$CONFIG" | sed 's/ *= */=/g')

            # Replace app name in strings.xml
            if [ -n "$APP_NAME" ]; then
              sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${APP_NAME}</string>|g" \
                app/src/main/res/values/strings.xml
              echo "✅ App name set to: $APP_NAME"
            fi

            # Replace package name in build.gradle
            if [ -n "$PACKAGE_NAME" ]; then
              sed -i "s|applicationId \".*\"|applicationId \"${PACKAGE_NAME}\"|g" app/build.gradle
              echo "✅ Package set to: $PACKAGE_NAME"
            fi

            # Replace theme color
            if [ -n "$THEME_COLOR" ]; then
              sed -i "s|<color name=\"colorPrimary\">.*</color>|<color name=\"colorPrimary\">${THEME_COLOR}</color>|g" \
                app/src/main/res/values/colors.xml 2>/dev/null || true
            fi

            # Inject API key into local.properties (read by BuildConfig)
            if [ -n "$API_KEY" ]; then
              echo "AIRA_API_KEY=${API_KEY}" >> local.properties
            fi

            # Replace icon if provided
            if [ -n "$APP_ICON" ] && [ -f "branding/$APP_ICON" ]; then
              for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
                DEST="app/src/main/res/mipmap-${density}/ic_launcher.png"
                mkdir -p "$(dirname $DEST)"
                cp "branding/$APP_ICON" "$DEST"
              done
              echo "✅ Icons replaced"
            fi

            # Replace splash
            if [ -n "$SPLASH_IMAGE" ] && [ -f "branding/$SPLASH_IMAGE" ]; then
              cp "branding/$SPLASH_IMAGE" app/src/main/res/drawable/splash_bg.png 2>/dev/null || true
              echo "✅ Splash replaced"
            fi
          else
            echo "ℹ️ No branding/config.txt found — skipping branding"
          fi

      # ─────────────────────────────────────────
      # 6. KEYSTORE SETUP
      # ─────────────────────────────────────────
      - name: Decode keystore
        if: env.BUILD_VARIANT != 'debug'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/aira-release.jks
            echo "✅ Keystore decoded"
          else
            echo "⚠️ No keystore secret found — unsigned build"
          fi

      - name: Write signing properties
        if: env.BUILD_VARIANT != 'debug'
        run: |
          if [ -f app/aira-release.jks ]; then
            cat >> local.properties << EOF
          KEYSTORE_PATH=aira-release.jks
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF
            echo "✅ Signing properties written"
          fi

      # ─────────────────────────────────────────
      # 7. INJECT VERSION INTO GRADLE
      # ─────────────────────────────────────────
      - name: Inject version into build.gradle
        run: |
          sed -i "s|versionCode [0-9]*|versionCode ${{ env.VERSION_CODE }}|g" app/build.gradle
          sed -i "s|versionName \"[^\"]*\"|versionName \"${{ env.VERSION_NAME }}\"|g" app/build.gradle

      # ─────────────────────────────────────────
      # 8. GRANT EXECUTE PERMISSION
      # ─────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ─────────────────────────────────────────
      # 9. BUILD
      # ─────────────────────────────────────────
      - name: Build APK
        id: build_apk
        run: |
          VARIANT="${{ env.BUILD_VARIANT }}"
          VARIANT_CAP="$(echo ${VARIANT:0:1} | tr '[:lower:]' '[:upper:]')${VARIANT:1}"
          ./gradlew assemble${VARIANT_CAP} --stacktrace --no-daemon 2>&1 | tee build.log
          echo "build_variant_cap=$VARIANT_CAP" >> $GITHUB_OUTPUT

      - name: Build AAB (release/pro only)
        if: env.BUILD_VARIANT == 'release' || env.BUILD_VARIANT == 'pro'
        run: |
          VARIANT="${{ env.BUILD_VARIANT }}"
          VARIANT_CAP="$(echo ${VARIANT:0:1} | tr '[:lower:]' '[:upper:]')${VARIANT:1}"
          ./gradlew bundle${VARIANT_CAP} --no-daemon 2>&1 | tee -a build.log

      # ─────────────────────────────────────────
      # 10. LOCATE OUTPUT FILES
      # ─────────────────────────────────────────
      - name: Locate build outputs
        id: find_outputs
        run: |
          VARIANT="${{ env.BUILD_VARIANT }}"
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          AAB=$(find app/build/outputs/bundle -name "*.aab" | head -1 || echo "")
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT
          echo "✅ APK: $APK"
          echo "✅ AAB: $AAB"

      # ─────────────────────────────────────────
      # 11. UPLOAD ARTIFACTS
      # ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aira-${{ env.BUILD_VARIANT }}-${{ env.VERSION_NAME }}-apk
          path: ${{ steps.find_outputs.outputs.apk_path }}
          retention-days: 30

      - name: Upload AAB artifact
        if: steps.find_outputs.outputs.aab_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: aira-${{ env.BUILD_VARIANT }}-${{ env.VERSION_NAME }}-aab
          path: ${{ steps.find_outputs.outputs.aab_path }}
          retention-days: 30

      # ─────────────────────────────────────────
      # 12. TELEGRAM UPLOAD
      # ─────────────────────────────────────────
      - name: Send APK to Telegram
        if: env.BUILD_VARIANT == 'release' || env.BUILD_VARIANT == 'pro'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK_PATH="${{ steps.find_outputs.outputs.apk_path }}"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ] && [ -f "$APK_PATH" ]; then
            CAPTION="🤖 *Aira Build Ready*%0A\
          📦 Variant: ${{ env.BUILD_VARIANT }}%0A\
          🔢 Version: ${{ env.VERSION_NAME }} (code: ${{ env.VERSION_CODE }})%0A\
          🌿 Branch: ${GITHUB_REF_NAME}%0A\
          📝 Commit: ${GITHUB_SHA::7}"

            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "document=@${APK_PATH}" \
              -F "caption=${CAPTION}" \
              -F "parse_mode=Markdown"
            echo "✅ APK sent to Telegram"
          else
            echo "ℹ️ Telegram secrets not set — skipping upload"
          fi

      # ─────────────────────────────────────────
      # 13. GITHUB RELEASE
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && env.BUILD_VARIANT == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Aira ${{ env.VERSION_NAME }}
          body: |
            ## 🤖 Aira Auto Release

            - **Version:** ${{ env.VERSION_NAME }}
            - **Build Code:** ${{ env.VERSION_CODE }}
            - **Branch:** ${{ github.ref_name }}
            - **Commit:** ${{ github.sha }}

            Built and signed automatically by GitHub Actions.
          files: |
            ${{ steps.find_outputs.outputs.apk_path }}
            ${{ steps.find_outputs.outputs.aab_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────
      # 14. ERROR LOG EXPORT (on failure)
      # ─────────────────────────────────────────
      - name: Upload error logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs-${{ github.run_number }}
          path: |
            build.log
            app/build/reports/
            **/*.hprof
          retention-days: 7
